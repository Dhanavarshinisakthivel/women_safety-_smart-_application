<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS - Women Safety App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <div class="container center">
    <div class="card">
      <h2>Emergency SOS</h2>
      <p class="muted">Pressing this button captures your live location, generates an
        emergency message using AI, and notifies your trusted contacts.</p>
      <div id="alertBox" class="alert-banner" style="display:none;"></div>
      <br>
      <button class="sos-button" onclick="triggerSos()">SOS</button>
      <p class="muted" id="locationStatus" style="margin-top:16px;">Location not captured yet.</p>
    </div>

    <div class="card" id="activeAlertCard" style="display:none;">
      <h3>Active Alert</h3>
      <p id="activeAlertMessage"></p>
      <button onclick="resolveAlert(false)">✅ I'm Safe Now</button>
      <button class="btn-secondary" onclick="resolveAlert(true)">This was a false alarm</button>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    requireLogin();
    renderNav();
    let currentAlertId = null;

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 5000 }
        );
      });
    }

    async function triggerSos() {
      document.getElementById("locationStatus").textContent = "Capturing your location...";
      const loc = await getLocation();
      document.getElementById("locationStatus").textContent = loc
        ? `Location captured: ${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}`
        : "Could not get location - alert will be sent without it.";

      try {
        const alert = await apiFetch("/api/sos/trigger", {
          method: "POST",
          body: JSON.stringify({ latitude: loc?.lat, longitude: loc?.lng })
        });
        currentAlertId = alert.id;
        showAlert("alertBox", "🚨 SOS Alert sent to your trusted contacts!", "success");
        document.getElementById("activeAlertCard").style.display = "block";
        document.getElementById("activeAlertMessage").textContent = alert.message;
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    }

    async function resolveAlert(falseAlarm) {
      if (!currentAlertId) return;
      try {
        await apiFetch(`/api/sos/${currentAlertId}/resolve`, {
          method: "POST",
          body: JSON.stringify({ falseAlarm })
        });
        showAlert("alertBox", falseAlarm ? "Marked as false alarm." : "Marked as resolved. Stay safe!", "success");
        document.getElementById("activeAlertCard").style.display = "none";
        currentAlertId = null;
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    }
  </script>
</body>
</html>
