<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <div class="container">
    <h1>⚙️ My Profile</h1>
    <div id="alertBox" class="alert-banner" style="display:none;"></div>
    <div class="card" style="max-width:480px;">
      <form id="profileForm">
        <label>Full Name</label><input type="text" id="fullName">
        <label>Phone</label><input type="text" id="phone">
        <label>Address</label><input type="text" id="address">
        <label>Photo URL (optional)</label><input type="text" id="photoUrl" placeholder="https://...">
        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    requireLogin();
    renderNav();

    async function loadProfile() {
      const p = await apiFetch("/api/profile/me");
      document.getElementById("fullName").value = p.fullName || "";
      document.getElementById("phone").value = p.phone || "";
      document.getElementById("address").value = p.address || "";
      document.getElementById("photoUrl").value = p.photoUrl || "";
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await apiFetch("/api/profile/me", {
          method: "PUT",
          body: JSON.stringify({
            fullName: document.getElementById("fullName").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value,
            photoUrl: document.getElementById("photoUrl").value
          })
        });
        localStorage.setItem("fullName", document.getElementById("fullName").value);
        showAlert("alertBox", "Profile updated!", "success");
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    });

    loadProfile();
  </script>
</body>
</html>
