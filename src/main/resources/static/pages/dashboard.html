<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Women Safety App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <div class="container">
    <h1>Welcome, <span id="userName"></span> 👋</h1>

    <div class="card">
      <h3>Quick Actions</h3>
      <a class="btn btn-danger" href="/pages/sos.html">🚨 Trigger SOS</a>
      <a class="btn" href="/pages/contacts.html">👥 Manage Contacts</a>
      <a class="btn" href="/pages/incidents.html">📝 Report Incident</a>
      <a class="btn btn-secondary" href="/pages/profile.html">⚙️ Edit Profile</a>
    </div>

    <div class="card">
      <h3>🤖 AI Safety Assistant</h3>
      <div id="chatBox" class="chat-box"></div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="chatInput" placeholder="Ask about safety tips, e.g. 'What should I do if I'm being followed?'">
        <button onclick="sendChat()">Send</button>
      </div>
    </div>

    <div class="card">
      <h3>Recent SOS Alerts</h3>
      <div id="alertsList" class="muted">Loading...</div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    requireLogin();
    renderNav();
    document.getElementById("userName").textContent = localStorage.getItem("fullName") || "";

    async function loadAlerts() {
      try {
        const alerts = await apiFetch("/api/sos");
        const el = document.getElementById("alertsList");
        if (alerts.length === 0) { el.textContent = "No alerts yet. Stay safe!"; return; }
        el.innerHTML = alerts.slice(0,5).map(a => `
          <div style="padding:8px 0;border-bottom:1px solid #f1c1d1;">
            <strong>${a.status}</strong> - ${new Date(a.triggeredAt).toLocaleString()}<br>
            <span class="muted">${a.message || ""}</span>
          </div>`).join("");
      } catch (err) {
        document.getElementById("alertsList").textContent = "Could not load alerts.";
      }
    }
    loadAlerts();

    function appendChat(text, sender) {
      const box = document.getElementById("chatBox");
      const div = document.createElement("div");
      div.className = "chat-msg " + sender;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById("chatInput");
      const message = input.value.trim();
      if (!message) return;
      appendChat(message, "user");
      input.value = "";
      appendChat("Thinking...", "bot");
      try {
        const data = await apiFetch("/api/ai/chat", { method: "POST", body: JSON.stringify({ message }) });
        document.getElementById("chatBox").lastChild.remove();
        appendChat(data.reply, "bot");
      } catch (err) {
        document.getElementById("chatBox").lastChild.remove();
        appendChat("Error: " + err.message, "bot");
      }
    }
    document.getElementById("chatInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendChat();
    });
  </script>
</body>
</html>
